<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart Viewer v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="signos-core.js"></script>
    <style>
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 sm:p-8">

<div class="max-w-5xl mx-auto no-print mb-6">
    <a href="#" onclick="goBack()" class="text-sm font-bold text-gray-500 hover:text-gray-900">← Back to Menu</a>
    <h1 class="text-3xl font-black text-gray-900 mt-2">Order Cart</h1>
</div>

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border border-gray-200">
    <!-- Work Order Header -->
    <div class="bg-gray-900 text-white p-6 flex justify-between items-end border-b-4 border-blue-600">
        <div>
            <h2 class="text-xl font-bold uppercase tracking-widest">Production Work Order</h2>
            <p class="text-xs text-gray-400">Date: <span id="date"></span> • Created By: <span id="cart-user" class="font-bold text-white">---</span></p>
        </div>
        <div class="text-right">
            <div class="text-2xl font-black">SignOS ERP</div>
        </div>
    </div>

    <div class="p-0">
        <table class="w-full text-left">
            <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase font-bold border-b">
                <tr>
                    <th class="p-4 w-1/4">Visual Proofs</th>
                    <th class="p-4 w-1/2">Job Details</th>
                    <th class="p-4 text-right">Price</th>
                    <th class="p-4 w-10 no-print"></th>
                </tr>
            </thead>
            <tbody id="cart-body" class="divide-y divide-gray-100"></tbody>
        </table>
    </div>

    <div class="p-6 bg-gray-50 border-t border-gray-200 flex justify-between items-center">
        <div class="text-xs text-gray-500 font-bold uppercase tracking-widest">Total Order Value</div>
        <div class="text-3xl font-black text-gray-900" id="cart-total">$0.00</div>
    </div>
</div>

<div class="max-w-5xl mx-auto mt-6 text-right no-print">
    <button onclick="printOrder()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg flex items-center justify-center gap-2 inline-flex">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
        Print Work Order
    </button>
</div>

<script>
    const user = sessionStorage.getItem('signos_user') || 'Guest';
    document.getElementById('date').innerText = new Date().toLocaleDateString();
    document.getElementById('cart-user').innerText = user;

    const cart = JSON.parse(sessionStorage.getItem('signos_cart')) || [];
    const tbody = document.getElementById('cart-body');
    let total = 0;

    if(cart.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400 italic">Cart is empty.</td></tr>`;
    } else {
        cart.forEach((item, idx) => {
            total += parseFloat(item.price.replace('$','')) || 0;
            
            let visuals = `<div class="flex gap-2">`;
            if(item.img3D) visuals += `<div class="w-16 h-16 bg-gray-100 border rounded p-1"><img src="${item.img3D}" class="w-full h-full object-contain" title="3D View"></div>`;
            if(item.imgFront) visuals += `<div class="w-16 h-16 bg-white border rounded p-1"><img src="${item.imgFront}" class="w-full h-full object-contain" title="Front Art"></div>`;
            if(item.imgBack) visuals += `<div class="w-16 h-16 bg-white border rounded p-1"><img src="${item.imgBack}" class="w-full h-full object-contain" title="Back Art"></div>`;
            visuals += `</div>`;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-4 align-top">${visuals}</td>
                <td class="p-4 align-top">
                    <div class="font-bold text-gray-900 text-lg">${item.product}</div>
                    <div class="text-sm text-gray-600 mt-1">${item.desc}</div>
                    <div class="inline-block bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-1 rounded mt-2">QTY: ${item.qty}</div>
                </td>
                <td class="p-4 text-right align-top font-bold text-gray-900 text-lg">${item.price}</td>
                <td class="p-4 text-center align-top no-print"><button onclick="removeItem(${idx})" class="text-red-400 hover:text-red-600 font-bold">×</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    document.getElementById('cart-total').innerText = "$" + total.toFixed(2);

    function removeItem(i) {
        cart.splice(i, 1);
        sessionStorage.setItem('signos_cart', JSON.stringify(cart));
        location.reload();
    }

    function goBack() { window.location.href = 'menu.html?mode=sales'; }

    function printOrder() {
        // TELEMETRY: Log the Checkout
        fetch(`${SCRIPT_URL}?req=log_event&action=PRINT_ORDER&user=${user}&ip=${clientIP}&cart_size=${cart.length}&total=${total}`, {mode: 'no-cors'});
        window.print();
    }
</script>
</body>
</html>
