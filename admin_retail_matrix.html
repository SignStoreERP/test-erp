<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retail Pricing Sandbox v1.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="signos-core.js"></script>
<style type="text/tailwindcss">
/* Zebra Striping */
tbody tr:nth-child(even) { background-color: #f8fafc; }
tbody tr:hover { background-color: #fefce8 !important; }

/* Custom Scroll */
.custom-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f8fafc; }
.custom-scroll::-webkit-scrollbar { width: 6px; height: 8px; }
.custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
.custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* Staged Changes */
.staged-change { background-color: #fef9c3 !important; position: relative; }
.staged-change::after { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 6px solid #eab308; border-left: 6px solid transparent; }

/* Tab Buttons */
.tab-btn { @apply flex-1 py-3 text-xs font-bold text-center uppercase tracking-widest cursor-pointer border-b-2 transition-colors; }
.tab-active { @apply border-blue-600 text-blue-700 bg-blue-50/50; }
.tab-inactive { @apply border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50; }

.sticky-header { position: sticky; top: 0; z-index: 20; background-color: #f9fafb; border-bottom: 2px solid #e5e7eb; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans overflow-hidden">

<div id="main-card" class="flex-1 flex flex-col min-h-0 bg-white shadow-xl m-4 rounded-xl border border-gray-200 overflow-hidden relative">

    <!-- HEADER -->
    <div class="bg-white px-6 py-4 flex flex-col sm:flex-row justify-between items-center shrink-0 border-b border-gray-200 gap-4">
        <div>
            <h2 class="text-xl font-black text-gray-800 tracking-tight">Retail Pricing Sandbox</h2>
            <p class="text-xs text-gray-500 font-medium mt-1">Safely modify Master Area Curves and Blue Sheet fixed prices.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="loadData()" class="bg-gray-50 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded shadow-sm text-xs font-bold border border-gray-200 transition">↻ REFRESH DATA</button>
        </div>
    </div>

    <!-- TAB CONTROLS -->
    <div class="flex shrink-0 border-b border-gray-200 bg-white">
        <div onclick="switchTab('curves')" id="tab-curves" class="tab-btn tab-active">Master Area Curves</div>
        <div onclick="switchTab('blue')" id="tab-blue" class="tab-btn tab-inactive">Master Blue Sheet (Fixed)</div>
    </div>

    <!-- CONTENT AREA -->
    <div class="flex-1 overflow-auto relative custom-scroll pb-24" id="table-container">
        <!-- Tables injected here -->
        <table class="w-full text-left border-collapse" id="data-table">
            <thead class="text-[10px] text-gray-500 font-bold uppercase tracking-widest bg-gray-50" id="table-head"></thead>
            <tbody id="table-body" class="text-xs font-medium text-gray-700 divide-y divide-gray-100"></tbody>
        </table>

        <!-- Loader -->
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white/90 z-50">
            <div class="flex flex-col items-center">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-xs font-bold text-gray-400 mt-3 tracking-widest uppercase">FETCHING LIVE DATA...</span>
            </div>
        </div>
    </div>

    <!-- COMMIT BAR -->
    <div id="commit-bar" class="absolute bottom-0 left-0 right-0 bg-gray-900 text-white p-4 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_20px_rgba(0,0,0,0.2)] flex justify-between items-center z-40">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 text-black font-black text-[10px] px-2 py-1 rounded tracking-widest uppercase shadow">Unsaved Changes</div>
            <div class="text-sm text-gray-300"><span id="change-count" class="font-bold text-white text-lg">0</span> retail updates staged.</div>
        </div>
        <div class="flex gap-3">
            <button onclick="discardChanges()" class="text-gray-400 hover:text-white text-xs font-bold uppercase px-3 transition">Discard</button>
            <button onclick="commitChanges()" id="btn-commit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-6 rounded text-xs uppercase tracking-wide shadow-lg flex items-center gap-2 transition">
                <span>Commit Updates</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            </button>
        </div>
    </div>

</div>

<script>
let rawCurves = [];
let rawBlueSheet = [];
let currentTab = 'curves';
let pendingChanges = {}; 

// Helpers
function val(obj, key) { if (!obj) return ""; return obj[key] || obj[key.toUpperCase()] || obj[key.toLowerCase()] || ""; }

window.onload = function() {
    if (typeof injectHeader === "function") injectHeader("Retail Pricing Matrix", false);
    loadData();
};

async function loadData() {
    document.getElementById('loader').classList.remove('hidden');
    pendingChanges = {}; 
    updateCommitBar();

    try {
        const u = sessionStorage.getItem('signos_user') || 'Admin';
        const [curRes, blueRes] = await Promise.all([
            fetch(`${SCRIPT_URL}?req=table&tab=Master_Retail_Curves&user=${u}`),
            fetch(`${SCRIPT_URL}?req=table&tab=Master_Retail_Blue_Sheet&user=${u}`)
        ]);
        
        rawCurves = await curRes.json();
        rawBlueSheet = await blueRes.json();

        if(rawCurves.error) throw new Error(rawCurves.error);

        renderCurrentTab();
        document.getElementById('loader').classList.add('hidden');

        const statusText = document.getElementById("status-text");
        const statusDot = document.getElementById("status-dot");
        if(statusText) { statusText.innerText = "ONLINE"; statusText.className = "text-xs font-bold text-green-500"; }
        if(statusDot) { statusDot.classList.replace("bg-yellow-400", "bg-green-500"); statusDot.classList.remove("animate-pulse"); }

    } catch(e) {
        console.error(e);
        alert("Failed to load Retail Data: " + e.message);
        document.getElementById('loader').classList.add('hidden');
        const statusText = document.getElementById("status-text");
        if(statusText) { statusText.innerText = "OFFLINE"; statusText.className = "text-xs font-bold text-red-500"; }
    }
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-curves').className = tab === 'curves' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
    document.getElementById('tab-blue').className = tab === 'blue' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
    renderCurrentTab();
}

function renderCurrentTab() {
    if (currentTab === 'curves') renderCurves();
    else renderBlueSheet();
}

// --- CURVES RENDERER ---
function renderCurves() {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');
    
    thead.innerHTML = `
        <tr>
            <th class="p-3 sticky-header w-48">Curve ID</th>
            <th class="p-3 sticky-header w-48">Product Line</th>
            <th class="p-3 sticky-header text-center w-24">Condition</th>
            <th class="p-3 sticky-header text-center w-24 border-l border-gray-200">SqFt Min</th>
            <th class="p-3 sticky-header text-center w-24">SqFt Max</th>
            <th class="p-3 sticky-header text-center w-32 bg-blue-50 border-l border-blue-100">Rate / SqFt ($)</th>
            <th class="p-3 sticky-header text-center w-32 bg-purple-50 border-l border-purple-100">Min Price ($)</th>
        </tr>
    `;

    tbody.innerHTML = "";
    rawCurves.forEach(row => {
        const id = val(row, 'Curve_ID');
        if(!id) return;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="p-3 font-mono text-[10px] text-gray-400 font-bold">${id}</td>
            <td class="p-3 font-bold text-gray-800">${val(row, 'Product_Line')}</td>
            <td class="p-3 text-center"><span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] uppercase tracking-wide font-bold">${val(row, 'Condition')}</span></td>
            <td class="p-3 text-center text-gray-500 border-l border-gray-100">${val(row, 'SqFt_Min')}</td>
            ${renderInputCell('Master_Retail_Curves', 'Curve_ID', id, 'SqFt_Max', val(row, 'SqFt_Max'), '')}
            ${renderInputCell('Master_Retail_Curves', 'Curve_ID', id, 'Price_Per_SqFt', val(row, 'Price_Per_SqFt'), 'bg-blue-50 border-l border-blue-100')}
            ${renderInputCell('Master_Retail_Curves', 'Curve_ID', id, 'Min_Price_Per_Sign', val(row, 'Min_Price_Per_Sign'), 'bg-purple-50 border-l border-purple-100')}
        `;
        tbody.appendChild(tr);
    });
}

// --- BLUE SHEET RENDERER ---
function renderBlueSheet() {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');
    
    thead.innerHTML = `
        <tr>
            <th class="p-3 sticky-header w-48">Retail Key</th>
            <th class="p-3 sticky-header w-48">Product Line</th>
            <th class="p-3 sticky-header text-center w-32">Dims / Sides</th>
            <th class="p-3 sticky-header text-center w-32 bg-green-50 border-l border-green-100">Price (Qty 1) ($)</th>
            <th class="p-3 sticky-header text-center w-32 bg-teal-50 border-l border-teal-100">Price (Qty 10+) ($)</th>
            <th class="p-3 sticky-header text-left border-l border-gray-200">Notes</th>
        </tr>
    `;

    tbody.innerHTML = "";
    rawBlueSheet.forEach(row => {
        const id = val(row, 'Retail_Key');
        if(!id) return;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="p-3 font-mono text-[10px] text-gray-400 font-bold">${id}</td>
            <td class="p-3 font-bold text-gray-800">${val(row, 'Product_Line')}</td>
            <td class="p-3 text-center leading-tight">
                <div class="font-bold text-gray-700">${val(row, 'Dimensions')}</div>
                <div class="text-[9px] text-gray-400 uppercase tracking-widest">${val(row, 'Sides')}</div>
            </td>
            ${renderInputCell('Master_Retail_Blue_Sheet', 'Retail_Key', id, 'Price_Qty_1', val(row, 'Price_Qty_1'), 'bg-green-50/50 border-l border-green-100')}
            ${renderInputCell('Master_Retail_Blue_Sheet', 'Retail_Key', id, 'Price_Qty_10_Plus', val(row, 'Price_Qty_10_Plus'), 'bg-teal-50/50 border-l border-teal-100')}
            <td class="p-3 text-[10px] text-gray-500 border-l border-gray-100 italic">${val(row, 'Notes')}</td>
        `;
        tbody.appendChild(tr);
    });
}

// --- INPUT GENERATOR & HANDLER ---
function renderInputCell(tabName, idCol, idVal, field, currentVal, extraClasses) {
    const key = `${tabName}|${idVal}|${field}`;
    const stagedObj = pendingChanges[key];
    const displayVal = stagedObj ? stagedObj.value : currentVal;
    const isStaged = !!stagedObj;
    
    let styleClass = isStaged ? "bg-yellow-100 border-yellow-400 text-yellow-900 font-bold" : "bg-white border-gray-300 text-gray-800 font-bold";
    
    return `<td class="p-2 text-center align-middle ${extraClasses} ${isStaged ? 'staged-change' : ''}" id="td-${key}">
        <input type="number" step="0.01" value="${displayVal}" data-orig="${currentVal}"
        onchange="stageChange('${tabName}', '${idCol}', '${idVal}', '${field}', this.value, this)"
        class="w-20 text-center border rounded text-xs py-1.5 outline-none transition-colors shadow-inner focus:border-blue-500 focus:ring-1 focus:ring-blue-500 ${styleClass}">
    </td>`;
}

function stageChange(tabName, idCol, idVal, field, newVal, el) {
    const key = `${tabName}|${idVal}|${field}`;
    const origVal = el.getAttribute('data-orig');
    const td = document.getElementById(`td-${key}`);
    
    if (parseFloat(newVal) === parseFloat(origVal) || (newVal === "" && origVal === "")) {
        // Revert to original
        delete pendingChanges[key];
        el.className = "w-20 text-center border rounded text-xs py-1.5 outline-none transition-colors shadow-inner focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white border-gray-300 text-gray-800 font-bold";
        td.classList.remove('staged-change');
    } else {
        // Stage update
        pendingChanges[key] = { 
            tab: tabName, 
            idColumn: idCol, 
            idValue: idVal, 
            field: field, 
            value: newVal 
        };
        el.className = "w-20 text-center border rounded text-xs py-1.5 outline-none transition-colors shadow-inner focus:border-yellow-600 focus:ring-1 focus:ring-yellow-600 bg-yellow-100 border-yellow-400 text-yellow-900 font-bold";
        td.classList.add('staged-change');
    }
    
    updateCommitBar();
}

function updateCommitBar() {
    const count = Object.keys(pendingChanges).length;
    const bar = document.getElementById('commit-bar');
    document.getElementById('change-count').innerText = count;
    if (count > 0) bar.classList.remove('translate-y-full');
    else bar.classList.add('translate-y-full');
}

function discardChanges() {
    if(confirm("Discard all unsaved retail pricing changes?")) loadData();
}

// --- COMMIT LOGIC ---
async function commitChanges() {
    alert("API PENDING: The Frontend UI and Staging engine is complete. We need to add the 'commit_retail_batch' endpoint to Code.gs next to save these values to the Master Sheets.");
}
</script>
</body>
</html>
