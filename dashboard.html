<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignOS Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden font-sans text-slate-900">

    <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
        <div class="p-8 text-2xl font-black border-b border-slate-800 flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500 rounded-lg shadow-lg"></div> SignOS
        </div>
        <nav class="flex-1 p-6 space-y-2 overflow-y-auto">
            <button onclick="loadModule('sales')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl flex items-center gap-3 transition-all">
                <i data-lucide="shopping-cart" class="w-5 h-5 text-blue-400"></i> Sales & Quotes
            </button>
            <button onclick="loadModule('crm')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl flex items-center gap-3 transition-all">
                <i data-lucide="users" class="w-5 h-5 text-emerald-400"></i> Customer CRM
            </button>
            <button onclick="loadModule('production')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl flex items-center gap-3 transition-all">
                <i data-lucide="layout-list" class="w-5 h-5 text-orange-400"></i> Production Floor
            </button>

            <div class="h-6"></div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold ml-2">System Config</label>
            
            <button onclick="loadModule('admin_costs')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl flex items-center gap-3 transition-all">
                <i data-lucide="settings" class="w-5 h-5 text-slate-400"></i> Global Settings
            </button>
            <button onclick="loadModule('admin_roadmap')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl flex items-center gap-3 transition-all">
                <i data-lucide="map" class="w-5 h-5 text-slate-400"></i> Roadmap & Logs
            </button>

            <div class="h-6"></div>
            
            <button onclick="loadModule('admin_dev')" class="w-full text-left p-3 bg-red-900/30 hover:bg-red-900 border border-red-800/50 rounded-xl flex items-center gap-3 transition-all text-red-400 mt-4">
                <i data-lucide="terminal" class="w-5 h-5"></i> <span class="text-sm font-bold tracking-wide">Developer Console</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b flex items-center justify-between px-10 shrink-0">
            <h2 id="view-title" class="text-2xl font-bold text-slate-800">Workspace</h2>
            <div id="api-status" class="text-xs font-bold text-green-500 uppercase flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                API Online
            </div>
        </header>
        
        <section id="module-stage" class="flex-1 overflow-y-auto p-10 bg-slate-50/50"></section>
    </main>

    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div id="modal-content" class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full p-10 max-h-[90vh] overflow-y-auto"></div>
    </div>

    <script>
        // Use the actual cloud URL, without hardcoding the port
        const API = window.location.origin;

        async function loadModule(moduleName) {
            const stage = document.getElementById('module-stage');
            stage.innerHTML = `<div class="p-20 text-center animate-pulse text-slate-400 font-bold">Loading ${moduleName}...</div>`;
            
            try {
                // Fetch the JS file from the /modules/ directory
                const script = document.createElement('script');
                script.src = `./modules/${moduleName}.js?v=${Date.now()}`;
                
                script.onload = () => {
                    if (window[`init_${moduleName}`]) {
                        window[`init_${moduleName}`](stage, API);
                    } else {
                        // If we hit this, it means FastAPI returned an error JSON instead of a real JS file
                        stage.innerHTML = `
                        <div class="p-10 text-red-500 font-bold border border-red-200 bg-red-50 rounded-2xl">
                            Module Error: Could not find <code>${moduleName}.js</code> in the /modules/ folder on the server.
                        </div>`;
                    }
                };

                script.onerror = () => {
                    stage.innerHTML = `<div class="p-10 text-red-500 font-bold border border-red-200 bg-red-50 rounded-2xl">Failed to load module file: /modules/${moduleName}.js</div>`;
                };

                document.body.appendChild(script);
            } catch (e) {
                stage.innerHTML = `<div class="p-10 text-red-500 font-bold">Fatal error loading module: ${e.message}</div>`;
            }
        }

        // Default view on load
        window.onload = () => { 
            // Boot into the Developer Console by default
            loadModule('admin_dev'); 
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
